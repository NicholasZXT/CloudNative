---
- name: Generate Ubuntu OpenSSH Key
  tags: ubuntu_ssh_key
  hosts: ubuntu
  tasks:
    - name: Show hostname with IP
      ansible.builtin.debug:
        msg: "Hostname is [{{ ansible_hostname }}] with IP [{{ ansible_default_ipv4 }}]"
    - name: Generate OpenSSH key on ubuntu
      community.crypto.openssh_keypair:
        path: ~/.ssh/id_ssh_rsa_hadoop
        type: rsa
        size: 2048
        comment: vagrant@hadoop123
        force: true

# ***************************************************************
- name: Distributing Ubuntu SSH public key
  tags: ubuntu_ssh_key
  hosts: hadoop_nodes
  tasks:
    - name: Show hostname with IP
      ansible.builtin.debug:
        msg: "Hostname is [{{ ansible_hostname}}] with IP [{{ ansible_default_ipv4 }}]"
    - name: Distributing Ubuntu SSH public key to Hadoop-Nodes
      ansible.posix.authorized_key:
        user: vagrant
        state: present
        key: "{{ lookup('file', '/home/vagrant/.ssh/id_ssh_rsa_hadoop.pub') }}"


# ***************************************************************
- name: Disable swap on all hadoop-nodes
  tags: swap_off
  hosts: hadoop_nodes
  become: yes
  tasks:
  - name: Disable swap on all nodes
    ansible.builtin.include_role:
      name: geerlingguy.swap
    vars:
      swap_file_state: absent


# ***************************************************************
- name: Modifying /etc/hosts
  tags: hosts
  hosts: hadoop_nodes
  tasks:
  - name: Comment out lines containing 127.0.1.1 in /etc/hosts
    ansible.builtin.lineinfile:
      path: /etc/hosts
      # search_string: '127.0.1.1'  # 匹配不以#开头且包含127.0.1.1的行
      regexp: '(127\.0\.1\.1.*)$'  # 匹配不以#开头且包含127.0.1.1的行
      line: '# \1'
      # line: 'dasfsafas'
      backrefs: yes
      state: present
    become: yes
    register: comment_res
    # ignore_errors: True
  # - name: Debug comment result
  #   debug:
  #     var: comment_res


# ***************************************************************
- name: Create hadoop users and group on all hadoop-nodes
  tags: hadoop_user
  hosts: hadoop_nodes
  become: yes
  tasks:
  # 创建hadoop用户组
  - name: Ensure hadoop group exists
    ansible.builtin.group:
      name: hadoop
      state: present
  # 将 vagrant 用户加入到 hadoop用户组中
  - name: Ensure user is added to the specified group
    ansible.builtin.user:
      name: vagrant
      groups: hadoop
      append: yes

  # 不是在执行节点的Python环境安装passlib，而是需要在控制节点安装，因为为下面的用户设置密码时需要做hash处理
  # - name: Install passlib using pip3
  #   pip:
  #     name: passlib
  #     state: present
  #     executable: /usr/local/bin/pip3
  #     extra_args: "-i https://pypi.tuna.tsinghua.edu.cn/simple"

  # ----- hadoop 用户 -----
  - name: Create [hadoop] user with home directory
    ansible.builtin.user:
      name: hadoop
      group: hadoop
      state: present
      createhome: yes # 自动创建主目录
      shell: /bin/bash # 设置默认shell
      home: /home/hadoop # 可选：明确指定主目录路径
      # 下面的密码使用了过滤器，引入了 passlib 包中的函数 password_hash，
      # 特别要注意的是，需要在 ansbile 控制节点的Python环境里安装 passlib，而不是执行节点上安装
      password: "{{ 'hadoop2025' | password_hash('sha512') }}"
  # 主要是更改 /home/hadoop 用户目录的mode
  - name: Ensure [hadoop] home directory exists for [hadoop] user and check mode
    ansible.builtin.file:
      path: /home/hadoop
      state: directory
      # recurse: true
      mode: '755'
      owner: hadoop
      group: hadoop
    become: yes
    become_user: hadoop

  # ----- hdfs 用户 -----
  - name: Create [hdfs] user with home directory
    ansible.builtin.user:
      name: hdfs
      group: hadoop
      state: present
      createhome: yes # 自动创建主目录
      shell: /bin/bash # 设置默认shell
      home: /home/hdfs # 可选：明确指定主目录路径
      password: "{{ 'hadoop2025' | password_hash('sha512') }}"
  - name: Ensure [hdfs] home directory exists for [hdfs] user and check mode
    ansible.builtin.file:
      path: /home/hdfs
      state: directory
      # recurse: true
      mode: '755'
      owner: hdfs
      group: hadoop
    become: yes
    become_user: hdfs

  # ----- yarn 用户 -----
  - name: Create [yarn] user with home directory
    ansible.builtin.user:
      name: yarn
      group: hadoop
      state: present
      createhome: yes # 自动创建主目录
      shell: /bin/bash # 设置默认shell
      home: /home/yarn # 可选：明确指定主目录路径
      password: "{{ 'hadoop2025' | password_hash('sha512') }}"
  - name: Ensure [yarn] home directory exists for [yarn] user and check mode
    ansible.builtin.file:
      path: /home/yarn
      state: directory
      # recurse: true
      mode: '755'
      owner: yarn
      group: hadoop
    become: yes
    become_user: yarn


