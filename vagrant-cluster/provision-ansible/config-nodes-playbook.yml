# ***************************************************************
- name: Create and configure hadoop users ssh-key login on all hadoop-nodes
  tags: hadoop_sshkey
  hosts: hadoop_nodes
  vars:
    nodes: ["hadoop1", "hadoop2", "hadoop3"]
  tasks: 
  # ===========================================================
  # --- 在每个节点上为 hadoop/hdfs/yarn 用户生成 SSH-Key ---
  - name: Ensure .ssh directory exists for [hadoop] user
    file:
      path: /home/hadoop/.ssh
      state: directory
      # recurse: true
      mode: '0700'
      owner: hadoop
      group: hadoop
    become: yes
    become_user: hadoop
  - name: Generate SSH keypair for [hadoop] user if not exists
    community.crypto.openssh_keypair:
      path: /home/hadoop/.ssh/id_rsa
      type: rsa
      size: 2048
      force: true
    become: yes
    become_user: hadoop

  - name: Ensure .ssh directory exists for [hdfs] user
    file:
      path: /home/hdfs/.ssh
      state: directory
      # recurse: true
      mode: '0700'
      owner: hdfs
      group: hadoop
    become: yes
    become_user: hdfs
  - name: Generate SSH keypair for [hdfs] user if not exists
    community.crypto.openssh_keypair:
      path: /home/hdfs/.ssh/id_rsa
      type: rsa
      size: 2048
      force: true
    become: yes
    become_user: hdfs

  - name: Ensure .ssh directory exists for [yarn] user
    file:
      path: /home/yarn/.ssh
      state: directory
      # recurse: true
      mode: '0700'
      owner: yarn
      group: hadoop
    become: yes
    become_user: yarn
  - name: Generate SSH keypair for [yarn] user if not exists
    community.crypto.openssh_keypair:
      path: /home/yarn/.ssh/id_rsa
      type: rsa
      size: 2048
      force: true
    become: yes
    become_user: yarn

  # ===========================================================
  # --- 分发 hadoop/hdfs/yarn 用户的 SSH-key ---
  - name: Distribute SSH-Key for user [hadoop]
    include_tasks: ./distribute-user-sshkey-tasks.yml
    vars:
      user: hadoop
    # 嵌套循环
    loop: "{{ nodes | product(nodes) | list }}"
    
  - name: Distribute SSH-Key for user [hdfs]
    include_tasks: ./distribute-user-sshkey-tasks.yml
    vars:
      user: hdfs
    loop: "{{ nodes | product(nodes) | list }}"

  - name: Distribute SSH-Key for user [yarn]
    include_tasks: ./distribute-user-sshkey-tasks.yml
    vars:
      user: yarn
    loop: "{{ nodes | product(nodes) | list }}"
