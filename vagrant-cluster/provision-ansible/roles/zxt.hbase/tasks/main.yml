---
# ---------- 变量检查 ---------
- name: assert | check java_home
  ansible.builtin.assert:
    that: 
      - java_home is defined
      - java_home != "unknown"
    # success_msg: java_home is defined
    fail_msg: java_home is not defined

- name: assert | check hbase_version
  ansible.builtin.assert:
    that: 
      - hbase_version is defined
      - hbase_version != "unknown"
    # success_msg: hbase_version is defined
    fail_msg: hbase_version is not defined

- name: assert | check hbase_local_tar
  ansible.builtin.assert:
    that: 
      - hbase_local_tar is defined
      - hbase_local_tar != "unknown"
    # success_msg: hbase_local_tar is defined
    fail_msg: hbase_local_tar is not defined

- name: assert | check delete_target_dir and reconfig
  ansible.builtin.assert:
    that: 
      - not (delete_target_dir|bool and reconfig|bool)
    fail_msg: >-
      Assertion failed: Both variables 'delete_target_dir' and 'reconfig' are set to true.
      This configuration is not allowed. Please ensure that at most one of them is true.
      Current values: delete_target_dir={{ delete_target_dir }}, reconfig={{ reconfig }}


# ------------ 确认服务用户/用户组存在 ------------------
- name: "Ensure hbase group[{{ hbase_group }}] exists"
  ansible.builtin.group:
    name: "{{ hbase_group }}"
    state: present

- name: "Ensure hbase user[{{ hbase_user }}] exist"
  ansible.builtin.user:
    name: "{{ hbase_user }}"
    group: "{{ hbase_group }}"
    system: yes
    create_home: no
    shell: /sbin/nologin

# ------------ 确认安装目录存在以及权限正确 ------------------
- name: "Remove old target dir [{{ hbase_target_dir }}]"
  file:
    path: "{{ hbase_target_dir }}"
    state: absent
  when: delete_target_dir

- name: "Ensure target dir [{{ hbase_target_dir }}] exist"
  ansible.builtin.file:
    path: "{{ hbase_target_dir }}"
    state: directory
    owner: "{{ hbase_user }}"
    group: "{{ hbase_group }}"
    mode: '0755'
    recurse: yes

# -------------------
# - name: Stop hbase
#   ansible.builtin.include_tasks: stop.yml
#   when: hbase_reformat

- name: Install hbase
  ansible.builtin.include_tasks: install.yml
  when: not reconfig

- name: Configure hbase
  ansible.builtin.include_tasks: configure.yml

