---
# ---------- 变量检查 ---------
- name: assert | check java_home
  ansible.builtin.assert:
    that: 
      - java_home is defined
      - java_home != "unknown"
    # success_msg: java_home is defined
    fail_msg: java_home is not defined

- name: assert | check flink_version
  ansible.builtin.assert:
    that: 
      - flink_version is defined
      - flink_version != "unknown"
    # success_msg: flink_version is defined
    fail_msg: flink_version is not defined

- name: assert | check flink_local_tar
  ansible.builtin.assert:
    that: 
      - flink_local_tar is defined
      - flink_local_tar != "unknown"
    # success_msg: flink_local_tar is defined
    fail_msg: flink_local_tar is not defined

- name: assert | check delete_target_dir and reconfig
  ansible.builtin.assert:
    that: 
      - not (delete_target_dir|bool and reconfig|bool)
    fail_msg: >-
      Assertion failed: Both variables 'delete_target_dir' and 'reconfig' are set to true.
      This configuration is not allowed. Please ensure that at most one of them is true.
      Current values: delete_target_dir={{ delete_target_dir }}, reconfig={{ reconfig }}


# ------------ 确认服务用户/用户组存在 ------------------
- name: "Ensure flink group[{{ flink_group }}] exists"
  ansible.builtin.group:
    name: "{{ flink_group }}"
    state: present

- name: "Ensure flink user[{{ flink_user }}] exist"
  ansible.builtin.user:
    name: "{{ flink_user }}"
    group: "{{ flink_group }}"
    system: yes
    create_home: no
    shell: /sbin/nologin

# ------------ 确认安装目录存在以及权限正确 ------------------
- name: "Remove old target dir [{{ flink_target_dir }}]"
  file:
    path: "{{ flink_target_dir }}"
    state: absent
  when: delete_target_dir

- name: "Ensure target dir [{{ flink_target_dir }}] exist"
  ansible.builtin.file:
    path: "{{ flink_target_dir }}"
    state: directory
    owner: "{{ flink_user }}"
    group: "{{ flink_group }}"
    mode: '0755'
    recurse: yes


# -------------------
- name: Install flink
  ansible.builtin.include_tasks: install.yml
  when: not reconfig

- name: Configure flink
  ansible.builtin.include_tasks: configure.yml

