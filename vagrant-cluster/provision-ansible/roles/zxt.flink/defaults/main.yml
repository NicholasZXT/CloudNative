java_home: unknown
flink_version: unknown
flink_local_tar: unknown

flink_user: flink
flink_group: flink
flink_target_dir: /opt/flink
flink_distro_home: "{{ flink_target_dir }}/current"


# 是否删除已有的target_dir
delete_target_dir: false
# 是否重新部署配置项
reconfig: false

flink_data_dir: "{{ flink_distro_home }}/data"
flink_log_dir: "{{ flink_distro_home }}/logs"

# flink_conf
flink_conf: {}
flink_conf_defaults:
  clientPort: 2181

