---
- name: "Unarchive zookeeper tgz to '{{ zookeeper_target_dir }}'"
  ansible.builtin.unarchive:
    src: "{{ zookeeper_local_tar }}"
    dest: "{{ zookeeper_target_dir }}"
    list_files: yes
    creates: "{{ zookeeper_target_dir }}/apache-zookeeper-{{ zookeeper_version }}-bin/bin/zkServer.sh"
    # creates: "{{ zookeeper_home }}/bin/zkServer.sh"
  register: unarchive_res


- name: Debug | Show unarchive result
  debug:
    msg: "unarchive_res.failed: {{ unarchive_res.failed }}, unarchive_res.changed: {{ unarchive_res.changed }}"

- name: Debug | Show zookeeper unarchive_res
  ansible.builtin.debug:
    var: unarchive_res.files[0]

# 找出解压后的父级文件夹名称
# - name: Debug | Show zookeeper archive dir
#   ansible.builtin.debug:
#     msg: "{{ zookeeper_target_dir }}/{{ unarchive_res.files[0] | regex_replace('/+$', '') }}"
# 使用下面这个方式更加健壮
- name: Debug | Show zookeeper archive dir
  ansible.builtin.debug:
    msg: "{{ zookeeper_target_dir }}/{{ unarchive_res.files[0].split('/')[0] }}"


- name: "Create link from {{ zookeeper_target_dir }}/{{ unarchive_res.files[0].split('/')[0] }} to current zookeeper distro {{ zookeeper_distro_home }}."
  ansible.builtin.file:
    path: "{{ zookeeper_distro_home }}"
    src: "{{ zookeeper_target_dir }}/{{ unarchive_res.files[0].split('/')[0] }}"
    state: link
  when: unarchive_res.changed

# 修改链接文件夹的权限/user/group，会直接修改目标文件夹的属性
- name: "Change owner to {{ zookeeper_user }} and allow group {{ zookeeper_group }} rwx"
  ansible.builtin.file:
    path: "{{ zookeeper_distro_home }}"
    owner: "{{ zookeeper_user }}"
    group: "{{ zookeeper_group }}"
    mode: u=rwx,g=rwx,o=r
    recurse: yes
    state: directory


