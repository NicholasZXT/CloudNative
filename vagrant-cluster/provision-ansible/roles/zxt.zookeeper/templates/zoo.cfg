initLimit=10
syncLimit=5

dataDir={{ zookeeper_data_dir }}
dataLogDir={{ zookeeper_log_dir }}

{% for worker, worker_id in zookeeper_workders.items() %}
server.{{ worker_id }} = {{ worker }}:2888:3888
{% endfor %}

{% set dict = zoo_cfg|combine(zoo_cfg_defaults) %}
{% for key,value in dict.items() %}
{{ key }} = {{ value }}
{% endfor %}