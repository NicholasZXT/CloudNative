# 直接使用这个，在配置正确时，可以同时启动 namenode + datanode
- name: Start HDFS services
  when: ansible_hostname == hadoop_namenode
  shell: "{{ hadoop_distro_home }}/sbin/start-dfs.sh"
  become: yes
  become_user: hdfs
  register: hdfs_start_res

- name: Start HDFS Result
  when: ansible_hostname == hadoop_namenode
  debug:
    var: hdfs_start_res.stderr_lines

