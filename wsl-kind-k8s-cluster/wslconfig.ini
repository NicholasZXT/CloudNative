[wsl2]
# ==========================================
# 1. 核心资源边界（防止宿主机 OOM）
# ==========================================
# 硬性内存上限：建议设为物理内存的 50%~75%
# 大数据组件(JVM) + K8s系统组件 + Docker开销 至少需要 16GB
memory=24GB

# Swap 空间：作为内存峰值缓冲，防止瞬时 OOM Kill
# 建议设为 memory 的 25%~50%
swap=8GB

# CPU 核心数限制：避免编译/ETL任务占满CPU导致Windows卡顿
# 建议保留 2-4 核给 Windows 宿主机
processors=8

# ==========================================
# 2. 网络与存储优化
# ==========================================
# 对于 Kind K8s 大数据集群场景，不建议启用 Mirrored 模式，应继续使用默认的 NAT 模式。
networkingMode=nat
; networkingMode=mirrored

# 允许 Windows localhost 直接访问 WSL2 内服务
# Kind集群 Ingress/MetalLB 暴露端口的必备前提
localhostForwarding=true

# 禁用 WSL2 自动回收内存（关键！）
# 默认开启时，WSL2 会在空闲时主动释放内存还给 Windows
# 这会导致大数据组件缓存频繁失效、GC抖动、性能骤降
autoMemoryReclaim=false

# DNS 配置：使用 WSL2 内置 DNS 解析器
# 避免企业网络环境下自定义 resolv.conf 被覆盖的问题
dnsTunneling=true

# ==========================================
# 3. 实验性优化（可选但推荐）
# ==========================================
[experimental]
# 启用稀疏 VHD：磁盘文件按需增长，删除容器/镜像后自动回收空间
# 避免 ext4.vhdx 无限膨胀占满 Windows 磁盘
sparseVhd=true
